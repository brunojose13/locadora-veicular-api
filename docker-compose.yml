services:
  car-rental-api:
    build: .
    container_name: car-rental-api
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      car-rental-mysql:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - car-rental
    restart: unless-stopped

  car-rental-mysql:
    image: mysql:8.4
    container_name: car-rental-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - car-rental-database:/var/lib/mysql
    networks:
      - car-rental
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  car-rental-database:
    driver: local

networks:
  car-rental:
    driver: bridge
